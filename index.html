<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join Now</title>

  <!-- Facebook Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod ?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];
    t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)
    }(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '1419304089717541');
    fbq('track', 'PageView');
  </script>
</head>

<body>

  <h2>Join Us</h2>

  <!-- Join Now Button -->
  <button onclick="joinNow()" 
    style="padding: 14px 28px; font-size: 18px; cursor: pointer;">
    Join Now
  </button>

  <script>
    function joinNow() {
      // 1. Standard Purchase Event
      fbq('track', 'Purchase', {
        value: 10.00,
        currency: 'USD'
      });

      // 2. Custom Subscribe Button Event (auto-detected in Events Manager)
      fbq('trackCustom', 'SubscribedButtonClick');

      alert('Purchase + Subscribe events fired');
    }
  </script>

</body>
</html>
