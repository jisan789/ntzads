<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facebook Pixel Events</title>

  <!-- Facebook Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod ?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];
    t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)
    }(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '1419304089717541');
    fbq('track', 'PageView');
  </script>
</head>

<body>

  <h2>Test Pixel Buttons</h2>

  <!-- Purchase Button -->
  <button onclick="trackPurchase()">
    Buy Now
  </button>

  <!-- Subscribe Button -->
  <button onclick="trackSubscribe()">
    Subscribe
  </button>

  <!-- PageView Button (Manual trigger) -->
  <button onclick="trackPageView()">
    Trigger Page View
  </button>

  <script>
    function trackPurchase() {
      fbq('track', 'Purchase', {
        value: 10.00,
        currency: 'USD'
      });
      alert('Purchase event fired');
    }

    function trackSubscribe() {
      fbq('trackCustom', 'SubscribedButtonClick');
      alert('SubscribedButtonClick event fired');
    }

    function trackPageView() {
      fbq('track', 'PageView');
      alert('PageView event fired');
    }
  </script>

</body>
</html>
